<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wash N Roll - Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- LOGIN SECTION -->
  <div id="login-section" class="admin-container">
    <div class="login-card">
      <div class="logo">WASH N ROLL</div>
      <h2>Admin Login</h2>
      <form id="login-form">
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="admin-email" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="admin-password" required>
        </div>
        <div id="login-error" class="error-msg" style="display: none;"></div>
        <button type="submit" class="btn btn-navy" id="login-btn">Login</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD SECTION (Hidden by default) -->
  <div id="dashboard-section" style="display: none;">
    <nav class="admin-nav">
      <div class="logo">WASH N ROLL ADMIN</div>
      <div class="nav-actions">
        <span id="user-email"></span>
        <button id="logout-btn" class="btn btn-outline">Logout</button>
      </div>
    </nav>

    <div class="dashboard-content">
      <div class="header-actions">
        <h2>Live Bookings</h2>
        <button id="refresh-btn" class="btn btn-navy">Refresh</button>
      </div>
      
      <div class="table-container">
        <table class="bookings-table">
          <thead>
            <tr>
              <th>Date / Time</th>
              <th>Service</th>
              <th>Vehicle</th>
              <th>Total</th>
              <th>Location</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="bookings-body">
            <!-- Bookings will be loaded here dynamically -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Firebase Scripts (Modular format) -->
  <script type="module" src="admin.js"></script>
</body>
</html>
